<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="app-version" content="2">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pasio Gym Battle Simulator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.5.0/lz-string.min.js"></script>
    <script>
        (function() {
            var v = document.querySelector('meta[name="app-version"]').content;
            var css = document.createElement('link');
            css.rel = 'stylesheet';
            css.href = 'style.css?v=' + v;
            document.head.appendChild(css);
        })();
    </script>
</head>
<body>

<!-- Help Modal -->
<div id="infoModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" id="modalCloseBtn" role="button" tabindex="0" aria-label="Close modal">&times;</span>
        <h3 id="modalTitle" class="modal-title">Title</h3>
        <div id="modalDesc" style="font-size: 14px; line-height: 1.5;">Description</div>
    </div>
</div>

<div class="container">
    <!-- Sticky Dashboard -->
    <div style="position: sticky; top: 0; z-index: 1000;">
        <div class="score-box">
            <div id="turnDisplay" style="font-weight: bold; font-size: 16px;">TURN 0</div>
            <h1 id="scoreDisplay">0 pts</h1>
            <div style="font-size: 14px; font-weight: bold;" id="dmgDisplay">Total DMG: 0</div>
            <button class="theme-toggle" id="themeToggleBtn" title="Toggle Dark/Light Mode" aria-label="Toggle dark and light theme">🌓</button>
        </div>
        <div class="dashboard">
            <div style="text-align: center; font-size: 12px; font-weight: bold; margin-bottom: 8px; color: var(--dark);" id="envDisplay">
                Weather: Clear | Field: None
            </div>
            <div class="dashboard-grid">
                <div class="dash-box" id="dash_left"></div>
                <div class="dash-box" id="dash_mid"></div>
                <div class="dash-box" id="dash_right"></div>
            </div>
        </div>
    </div>

    <!-- Boss Settings Card -->
    <div class="card" style="padding: 12px;">
        <div class="card-header-toggle" id="settingsToggle">
            <h3 style="display:flex; align-items:center; gap:8px;">⚙️ Boss Settings</h3>
            <span id="settingsToggleIcon" style="font-size: 12px; font-weight: bold;">▼</span>
        </div>
        
        <div id="globalSettingsContent">
            <div class="grid-2">
                <div>
                    <label for="bossSelect">Boss Selector</label>
                    <select id="bossSelect" class="compact">
                        <option value="custom">-- Custom / Manual --</option>
                        <optgroup label="Kanto">
                            <option value="brock">Brock (Rock)</option>
                            <option value="misty">Misty (Water)</option>
                            <option value="surge">Lt. Surge (Electric)</option>
                            <option value="erika">Erika (Grass)</option>
                            <option value="koga">Koga (Poison)</option>
                            <option value="sabrina">Sabrina (Psychic)</option>
                            <option value="blaine">Blaine (Fire)</option>
                            <option value="blue">Blue (Flying)</option>
                        </optgroup>
                        <optgroup label="Galar">
                            <option value="milo">Milo (Grass)</option>
                            <option value="nessa">Nessa (Water)</option>
                            <option value="kabu">Kabu (Fire)</option>
                            <option value="bea">Bea (Fighting)</option>
                            <option value="bede">Bede (Fairy)</option>
                            <option value="gordie">Gordie (Rock)</option>
                            <option value="marnie">Marnie (Dark)</option>
                            <option value="raihan">Raihan (Dragon)</option>
                        </optgroup>
                    </select>
                </div>
                <div>
                    <label for="circuit">Circuit Level</label>
                    <select id="circuit" class="compact">
                        <option value="1">1 (10k pts)</option>
                        <option value="2">2 (20k pts)</option>
                        <option value="3">3 (30k pts)</option>
                        <option value="4">4 (40k pts)</option>
                        <option value="5">5 (50k pts)</option>
                        <option value="6">6 (60k pts)</option>
                        <option value="7">7 (75k pts)</option>
                        <option value="8" selected>8+ (90k pts)</option>
                    </select>
                </div>
            </div>

            <div class="grid-auto">
                <div>
                    <label for="weakness">Weakness</label>
                    <select id="weakness" class="compact boss-prop"></select>
                </div>
                
                <div>
                    <label>Lessen Poison <span class="help-icon" role="button" tabindex="0" aria-label="Help: Lessen Poison" data-help="lessP">?</span></label>
                    <div class="stepper">
                        <button class="btn-stepper boss-prop" aria-label="Decrease Lessen Poison" data-stepper="lessP" data-delta="-1" data-min="0" data-max="10" data-boss="true">-</button>
                        <span id="txt_lessP" class="stepper-val">10</span>
                        <button class="btn-stepper boss-prop" aria-label="Increase Lessen Poison" data-stepper="lessP" data-delta="1" data-min="0" data-max="10" data-boss="true">+</button>
                        <input type="hidden" id="lessP" value="10">
                    </div>
                </div>
                
                <div>
                    <label>Lessen Trap <span class="help-icon" role="button" tabindex="0" aria-label="Help: Lessen Trap" data-help="lessT">?</span></label>
                    <div class="stepper">
                        <button class="btn-stepper boss-prop" aria-label="Decrease Lessen Trap" data-stepper="lessT" data-delta="-1" data-min="0" data-max="10" data-boss="true">-</button>
                        <span id="txt_lessT" class="stepper-val">9</span>
                        <button class="btn-stepper boss-prop" aria-label="Increase Lessen Trap" data-stepper="lessT" data-delta="1" data-min="0" data-max="10" data-boss="true">+</button>
                        <input type="hidden" id="lessT" value="9">
                    </div>
                </div>
                
                <div>
                    <label>Lessen Damage Field <span class="help-icon" role="button" tabindex="0" aria-label="Help: Lessen Damage Field" data-help="lessF">?</span></label>
                    <div class="stepper">
                        <button class="btn-stepper boss-prop" aria-label="Decrease Lessen Damage Field" data-stepper="lessF" data-delta="-1" data-min="0" data-max="10" data-boss="true">-</button>
                        <span id="txt_lessF" class="stepper-val">9</span>
                        <button class="btn-stepper boss-prop" aria-label="Increase Lessen Damage Field" data-stepper="lessF" data-delta="1" data-min="0" data-max="10" data-boss="true">+</button>
                        <input type="hidden" id="lessF" value="9">
                    </div>
                </div>
            </div>
            
            <div class="checkbox-row">
                <label style="text-transform:none"><input type="checkbox" id="sandShelter" class="boss-prop"> Sand Shelter <span class="help-icon" role="button" tabindex="0" aria-label="Help: Sand Shelter" data-help="sandShelter">?</span></label>
                <label style="text-transform:none"><input type="checkbox" id="snowShelter" class="boss-prop"> Snow Shelter <span class="help-icon" role="button" tabindex="0" aria-label="Help: Snow Shelter" data-help="snowShelter">?</span></label>
                <label style="text-transform:none"><input type="checkbox" id="escapeArtist" class="boss-prop"> Escape Artist <span class="help-icon" role="button" tabindex="0" aria-label="Help: Escape Artist" data-help="escapeArtist">?</span></label>
                <label style="text-transform:none"><input type="checkbox" id="antitoxin" class="boss-prop"> Antitoxin <span class="help-icon" role="button" tabindex="0" aria-label="Help: Antitoxin" data-help="antitoxin">?</span></label>
                <label style="text-transform:none; align-items:center;">
                    <span style="margin-right:4px;">DF Immunity <span class="help-icon" role="button" tabindex="0" aria-label="Help: DF Immunity" data-help="dfImmunity">?</span></span>
                    <select id="dfImmunity" class="compact boss-prop" style="width:90px; display:inline-block;">
                        <option value="None">None</option>
                    </select>
                </label>
            </div>
            
            <div style="margin-top: 10px; border-top: 1px dashed var(--border-light); padding-top: 10px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;">
                <div><label for="startHp_left">Start HP Left (%)</label><input type="number" id="startHp_left" class="compact" value="100" min="1" max="100"></div>
                <div><label for="startHp_mid">Start HP Mid (%)</label><input type="number" id="startHp_mid" class="compact" value="100" min="1" max="100"></div>
                <div><label for="startHp_right">Start HP Right (%)</label><input type="number" id="startHp_right" class="compact" value="100" min="1" max="100"></div>
            </div>
        </div>
    </div>

    <!-- Player Passives Card -->
    <div class="card" style="padding: 12px;">
        <h3 class="section-title">👤 Player Passives</h3>
        <div class="grid-2">
            <div>
                <label>Potent Toxin <span class="help-icon" role="button" tabindex="0" aria-label="Help: Potent Toxin" data-help="potent">?</span></label>
                <div class="stepper">
                    <button class="btn-stepper" aria-label="Decrease Potent Toxin" data-stepper="potent" data-delta="-1" data-min="0" data-max="999">-</button>
                    <span id="txt_potent" class="stepper-val">0</span>
                    <button class="btn-stepper" aria-label="Increase Potent Toxin" data-stepper="potent" data-delta="1" data-min="0" data-max="999">+</button>
                    <input type="hidden" id="potent" value="0">
                </div>
            </div>
            <div>
                <label>Pokey Trap <span class="help-icon" role="button" tabindex="0" aria-label="Help: Pokey Trap" data-help="pokey">?</span></label>
                <div class="stepper">
                    <button class="btn-stepper" aria-label="Decrease Pokey Trap" data-stepper="pokey" data-delta="-1" data-min="0" data-max="999">-</button>
                    <span id="txt_pokey" class="stepper-val">0</span>
                    <button class="btn-stepper" aria-label="Increase Pokey Trap" data-stepper="pokey" data-delta="1" data-min="0" data-max="999">+</button>
                    <input type="hidden" id="pokey" value="0">
                </div>
            </div>
        </div>
    </div>

    <!-- Action Panel -->
    <div class="card" id="actionContainer" style="display:none;">
        <div class="action-panel">
            <div class="action-block user-block">
                <label style="color:var(--primary); justify-content:center; border-bottom:1px solid var(--border-light); padding-bottom:5px; margin-bottom:10px;">User (You)</label>
                <div style="display:flex; justify-content:center; gap:15px;">
                    <div class="user-action-col">
                        <label style="font-size:10px; display:inline-flex;">TM <span class="help-icon" role="button" tabindex="0" aria-label="Help: Trainer Move" data-help="helpTM">?</span></label>
                        <button class="btn btn-primary" data-user-action="TM">TM</button>
                    </div>
                    <div class="user-action-col">
                        <label style="font-size:10px; display:inline-flex;">PM <span class="help-icon" role="button" tabindex="0" aria-label="Help: Pokémon Move" data-help="helpPM">?</span></label>
                        <button class="btn btn-primary" data-user-action="PM">PM</button>
                    </div>
                    <div class="user-action-col">
                        <label style="font-size:10px; display:inline-flex;">MAX <span class="help-icon" role="button" tabindex="0" aria-label="Help: Max Move" data-help="helpMAX">?</span></label>
                        <button class="btn btn-primary" data-user-action="MAX">MAX Move</button>
                    </div>
                </div>
            </div>
            
            <div class="action-block enemy-block">
                <label style="color:var(--danger); justify-content:center; border-bottom:1px solid var(--border-light); padding-bottom:5px; margin-bottom:10px;">Enemies</label>
                <div style="display:flex; gap:10px; justify-content:center;">
                    <div><span style="font-size:11px; font-weight:bold; color:#e74c3c;">LEFT</span><br><div class="btn-group" style="margin-top:4px;"><button class="btn" id="btn_Left_TM" data-enemy-actor="Left" data-enemy-action="TM">TM</button><button class="btn" id="btn_Left_PM" data-enemy-actor="Left" data-enemy-action="PM">PM</button></div></div>
                    <div><span style="font-size:11px; font-weight:bold; color:#e74c3c;">MID</span><br><div class="btn-group" style="margin-top:4px;"><button class="btn" id="btn_Mid_TM" data-enemy-actor="Mid" data-enemy-action="TM">TM</button><button class="btn" id="btn_Mid_PM" data-enemy-actor="Mid" data-enemy-action="PM">PM</button></div></div>
                    <div><span style="font-size:11px; font-weight:bold; color:#e74c3c;">RIGHT</span><br><div class="btn-group" style="margin-top:4px;"><button class="btn" id="btn_Right_TM" data-enemy-actor="Right" data-enemy-action="TM">TM</button><button class="btn" id="btn_Right_PM" data-enemy-actor="Right" data-enemy-action="PM">PM</button></div></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modifier Panel -->
    <div class="card" id="modifierPanel" style="display:none; border: 2px solid var(--primary); background: var(--box-bg);">
        <h3 id="modTitle" style="color:var(--primary); margin-bottom: 15px; border-bottom:1px solid var(--border-light); padding-bottom:10px;">⭐ Initial Entry Effects</h3>
        <div style="display:flex; gap:15px; margin-bottom:15px;">
            <div style="flex:1;"><label for="modWeather">Weather</label><select id="modWeather" class="compact"></select></div>
            <div style="flex:1;"><label for="modField">Damage Field</label><select id="modField" class="compact"></select></div>
        </div>

        <div id="targetRowsContainer" class="grid-3"></div>
        
        <button class="btn btn-primary" id="confirmModifierBtn" style="width:100%; margin-top:15px; padding:12px; font-size:15px;">Confirm Action</button>
    </div>

    <!-- Timeline -->
    <div class="timeline-header" id="tlHeader" style="display:none;">
        <h3 style="margin: 0; color: var(--dark);">Battle Timeline</h3>
        <div class="btn-group" style="flex-wrap: wrap; justify-content: flex-end;">
            <button class="btn btn-primary" id="exportBtn" style="border-radius: 4px;">🔗 Share Strategy</button>
            <button class="btn btn-danger" id="undoBtn" style="border-radius: 4px;">↺ Undo Action</button>
            <button class="btn" id="resetBtn" style="border-radius: 4px;">Reset</button>
        </div>
    </div>
    <div id="logArea"></div>
</div>

<script>
    (function() {
        var v = document.querySelector('meta[name="app-version"]').content;
        var s = document.createElement('script');
        s.src = 'app.js?v=' + v;
        s.onload = function() {
            if (typeof initApp === 'function') initApp();
        };
        document.body.appendChild(s);
    })();
</script>

</body>
</html>
